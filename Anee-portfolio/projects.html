<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aneefat Balogun · Projects | Cloud & Fashion Tech</title>
  <!-- Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: #FFFACD; /* LemonChiffon */
      color: #1e1e2a;
      line-height: 1.6;
      scroll-behavior: smooth;
    }

    :root {
      --lemon: #FFFACD;
      --ultraviolet: #5F4B8B;
      --ultraviolet-light: #7b6ba3;
      --card-bg: #fffffffa;
      --glow: 0 0 0 rgba(95, 75, 139, 0);
    }

    .container {
      max-width: 1300px;
      margin: 0 auto;
      padding: 0 28px;
    }

    /* ---------- ENHANCED ANIMATIONS ---------- */
    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0px); }
    }

    @keyframes fadeUp {
      0% { opacity: 0; transform: translateY(30px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    @keyframes scaleIn {
      0% { opacity: 0; transform: scale(0.92); }
      100% { opacity: 1; transform: scale(1); }
    }

    @keyframes borderPulse {
      0% { border-color: var(--ultraviolet); box-shadow: 0 0 0 0 rgba(95, 75, 139, 0.2); }
      50% { border-color: #8f7bc2; box-shadow: 0 0 12px 2px rgba(95, 75, 139, 0.3); }
      100% { border-color: var(--ultraviolet); box-shadow: 0 0 0 0 rgba(95, 75, 139, 0.2); }
    }

    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }

    /* ---------- NAVIGATION (consistent) ---------- */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 24px 0 16px;
      flex-wrap: wrap;
      border-bottom: 2px solid var(--ultraviolet);
    }
    .logo {
      font-size: 1.9rem;
      font-weight: 600;
      color: var(--ultraviolet);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .logo-pretty { font-weight: 300; font-size: 1.8rem; }
    .logo span {
      font-weight: 400;
      font-size: 0.9rem;
      background: var(--ultraviolet);
      color: var(--lemon);
      padding: 5px 14px;
      border-radius: 40px;
      margin-left: 12px;
    }
    .nav-links { display: flex; gap: 36px; font-weight: 500; }
    .nav-links a {
      text-decoration: none;
      color: var(--ultraviolet);
      font-size: 1.1rem;
      position: relative;
      padding-bottom: 4px;
    }
    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 0;
      height: 3px;
      background: var(--ultraviolet);
      transition: width 0.3s ease;
    }
    .nav-links a:hover::after { width: 100%; }
    .nav-links a.active::after { width: 100%; }

    .btn {
      display: inline-block;
      background: var(--ultraviolet);
      color: var(--lemon);
      font-weight: 600;
      padding: 12px 28px;
      border-radius: 48px;
      text-decoration: none;
      transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1);
      border: 2px solid var(--ultraviolet);
      box-shadow: 0 6px 14px rgba(95, 75, 139, 0.15);
    }
    .btn-outline {
      background: transparent;
      color: var(--ultraviolet);
      border: 2px solid var(--ultraviolet);
      box-shadow: none;
    }
    .btn-outline:hover {
      background: var(--ultraviolet);
      color: var(--lemon);
    }
    .btn:hover {
      transform: translateY(-4px) scale(1.02);
      box-shadow: 0 16px 24px -8px rgba(95, 75, 139, 0.35);
    }

    /* ---------- PROJECT PAGE HEADER ---------- */
    .page-header {
      padding: 48px 0 24px;
      animation: fadeUp 0.7s ease;
    }
    .page-header h1 {
      font-size: 3.5rem;
      font-weight: 700;
      color: var(--ultraviolet);
      letter-spacing: -0.02em;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    .page-header h1 i {
      background: var(--ultraviolet);
      color: var(--lemon);
      padding: 14px;
      border-radius: 30px;
      font-size: 2.2rem;
      box-shadow: 0 10px 18px rgba(95, 75, 139, 0.2);
      animation: float 4s infinite ease-in-out;
    }
    .page-sub {
      font-size: 1.2rem;
      margin-top: 12px;
      color: #3a2e4e;
      border-left: 5px solid var(--ultraviolet);
      padding-left: 24px;
    }

    /* ---------- FILTER BAR (animated) ---------- */
    .filter-section {
      margin: 40px 0 20px;
    }
    .filter-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
    }
    .filter-btn {
      background: white;
      border: 2px solid var(--ultraviolet);
      color: var(--ultraviolet);
      font-weight: 600;
      padding: 10px 24px;
      border-radius: 60px;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 2px 6px rgba(0,0,0,0.02);
      backdrop-filter: blur(4px);
    }
    .filter-btn i { margin-right: 8px; }
    .filter-btn:hover {
      background: #ece3ff;
      transform: translateY(-3px);
      box-shadow: 0 8px 16px rgba(95, 75, 139, 0.15);
    }
    .filter-btn.active {
      background: var(--ultraviolet);
      color: var(--lemon);
      box-shadow: 0 8px 18px rgba(95, 75, 139, 0.3);
    }

    /* ---------- PROJECTS GRID (professional animations) ---------- */
    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 32px;
      margin: 40px 0 60px;
    }

    .project-card {
      background: var(--card-bg);
      border-radius: 36px;
      padding: 32px 28px;
      box-shadow: 0 18px 30px -10px rgba(95, 75, 139, 0.12);
      border: 1.5px solid rgba(95, 75, 139, 0.2);
      display: flex;
      flex-direction: column;
      transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
      opacity: 0;
      animation: scaleIn 0.6s forwards;
      animation-delay: calc(0.07s * var(--order, 0));
      position: relative;
      overflow: hidden;
    }

    /* animated gradient overlay on hover */
    .project-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 6px;
      background: linear-gradient(90deg, transparent, var(--ultraviolet), #b8a2e3, var(--ultraviolet), transparent);
      background-size: 200% 100%;
      opacity: 0;
      transition: opacity 0.4s;
      animation: shimmer 3s infinite linear paused;
    }

    .project-card:hover {
      transform: translateY(-10px) scale(1.01);
      border-color: var(--ultraviolet);
      box-shadow: 0 30px 40px -14px rgba(95, 75, 139, 0.35);
    }

    .project-card:hover::before {
      opacity: 1;
      animation-play-state: running;
    }

    /* card icon animation */
    .project-icon {
      font-size: 3rem;
      color: var(--ultraviolet);
      margin-bottom: 20px;
      transition: transform 0.3s;
      display: inline-block;
      width: fit-content;
    }
    .project-card:hover .project-icon {
      transform: scale(1.1) rotate(1deg);
      text-shadow: 0 0 12px rgba(95, 75, 139, 0.3);
    }

    .project-card h3 {
      font-size: 1.9rem;
      font-weight: 700;
      margin-bottom: 12px;
      color: #1f1b2c;
    }

    .project-desc {
      color: #3a304a;
      margin-bottom: 20px;
      line-height: 1.5;
    }

    .project-tech {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 12px;
      margin: 16px 0 24px;
    }
    .tech-tag {
      background: #f2ebff;
      color: var(--ultraviolet);
      padding: 5px 16px;
      border-radius: 40px;
      font-size: 0.8rem;
      font-weight: 600;
      border: 1px solid #d9caf0;
      transition: 0.2s;
    }
    .tech-tag:hover {
      background: var(--ultraviolet);
      color: white;
    }

    .project-links {
      margin-top: auto;
      display: flex;
      gap: 24px;
      align-items: center;
    }
    .project-links a {
      color: var(--ultraviolet);
      font-weight: 700;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
      padding: 6px 0;
    }
    .project-links a i { transition: transform 0.2s; }
    .project-links a:hover {
      border-bottom-color: var(--ultraviolet);
      gap: 12px;
    }
    .project-links a:hover i { transform: translateX(4px); }

    /* empty state animation */
    .no-projects-message {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 20px;
      font-size: 1.5rem;
      background: rgba(95, 75, 139, 0.05);
      border-radius: 60px;
      color: var(--ultraviolet);
      animation: fadeUp 0.5s;
      border: 2px dashed var(--ultraviolet);
    }

    /* footer */
    .footer {
      margin-top: 40px;
      padding: 28px 0 20px;
      border-top: 2px solid var(--ultraviolet);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      color: #3a2e4e;
    }
    .social-links a {
      color: var(--ultraviolet);
      font-size: 1.8rem;
      margin-left: 24px;
      transition: 0.25s;
    }
    .social-links a:hover {
      transform: translateY(-5px) scale(1.15);
      color: #4a3a6e;
    }

    /* responsive */
    @media (max-width: 680px) {
      .navbar { flex-direction: column; gap: 16px; }
      .page-header h1 { font-size: 2.5rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Navigation -->
    <nav class="navbar">
      <div class="logo">
        <span class="logo-pretty">A·K·B</span>
        <span>cloud∙fashion</span>
      </div>
      <div class="nav-links">
        <a href="index.html"><i class="fas fa-home"></i> Home</a>
        <a href="#projects" class="active"><i class="fas fa-code-branch"></i> Projects</a>
        <a href="about.html"><i class="fas fa-user"></i> About</a>
        <a href="connect.html"><i class="fas fa-envelope"></i> Connect</a>
      </div>
    </nav>

    <!-- Project Page Header -->
    <header class="page-header">
      <h1>
        <i class="fas fa-cubes"></i> 
        crafted at the intersection
        <span style="background: var(--ultraviolet); color: var(--lemon); padding: 6px 22px; border-radius: 60px; font-size: 2rem;">fashion · cloud · code</span>
      </h1>
      <div class="page-sub">
        <i class="fas fa-cloud" style="margin-right: 10px;"></i> 
        Real repositories — from virtual try‑on to sustainable style, built with cloud-native thinking.
      </div>
    </header>

    <!-- Filter Bar with animation triggers -->
    <div class="filter-section">
      <div class="filter-buttons">
        <button class="filter-btn active" data-filter="all"><i class="fas fa-th-large"></i> All projects</button>
        <button class="filter-btn" data-filter="fashion"><i class="fas fa-tshirt"></i> Fashion Tech</button>
        <button class="filter-btn" data-filter="frontend"><i class="fas fa-laptop-code"></i> Frontend</button>
        <button class="filter-btn" data-filter="cloud"><i class="fas fa-cloud-upload-alt"></i> Cloud / Tools</button>
        <button class="filter-btn" data-filter="ai"><i class="fas fa-robot"></i> AI / ML</button>
      </div>
      <p style="margin-top: 16px; color: #4f406b; font-weight: 500;">
        <span id="projectCount">6</span> repositories · <i class="fab fa-github"></i> 
        <a href="#" id="githubProfileLink" style="color: var(--ultraviolet); font-weight: 700; text-decoration: underline;">Anny030</a>
      </p>
    </div>

    <!-- Projects Grid (dynamic) -->
    <div id="projectsGrid" class="projects-grid"></div>

    <!-- Footer -->
    <footer class="footer">
      <div>© 2026 Aneefat Kufre Balogun — lemon chiffon & ultraviolet</div>
      <div class="social-links">
        <a href="https://github.com/Anny030" aria-label="GitHub"><i class="fab fa-github"></i></a>
        <a href="https://www.linkedin.com/in/aneefat-balogun-b995b2249?utm_source=share_via&utm_content=profile&utm_medium=member_android" aria-label="LinkedIn"><i class="fab fa-linkedin-in"></i></a>
        <a href="https://x.com/annykufre" aria-label="Twitter"><i class="fab fa-twitter"></i></a>
      </div>
    </footer>
  </div>

  <script>
    (function() {
      const GITHUB_USER = 'Anny030';
      const githubBase = `https://github.com/${GITHUB_USER}`;
      
      // ----- REAL PROJECT DATA (from Anny030) with categories -----
      const projectsData = [
        {
          name: "ChicPeek",
          description: "Virtual try‑on: upload photo, overlay garments. Pure frontend magic.",
          tech: ["CSS", "HTML", "JavaScript", "Remove.bg"],
          github: `${githubBase}/ChicPeek-`,
          demo: `https://anny030.github.io/ChicPeek-`,
          icon: "fa-camera-retro",
          category: ["fashion", "frontend"]
        },
        {
          name: "EcoStyle",
          description: "Sustainable fashion tracker — log items, see carbon impact.",
          tech: ["JavaScript", "LocalStorage", "Material DB"],
          github: `${githubBase}/EcoStyle`,
          demo: null,
          icon: "fa-leaf",
          category: ["fashion", "frontend"]
        },
        {
          name: "ColorCue",
          description: "AI color palette extractor from outfit images. HEX & dominant tones.",
          tech: ["JavaScript", "Color Thief", "Responsive"],
          github: `${githubBase}/ColorCue`,
          demo: `https://color-cue.vercel.app`,
          icon: "fa-palette",
          category: ["ai", "fashion", "frontend"]
        },
        {
          name: "BalogunAneefat.github.io",
          description: "First portfolio site — foundation of frontend journey.",
          tech: ["HTML", "CSS"],
          github: `${githubBase}/BalogunAneefat.github.io`,
          demo: `https://anny030.github.io/BalogunAneefat.github.io`,
          icon: "fa-code",
          category: ["frontend"]
        },
        {
          name: "FigmaAssignment-1",
          description: "Pixel-perfect Figma to HTML implementation.",
          tech: ["HTML", "CSS", "Figma"],
          github: `${githubBase}/FigmaAssignment-1.github.io`,
          demo: `https://anny030.github.io/FigmaAssignment-1.github.io`,
          icon: "fa-paint-brush",
          category: ["frontend"]
        },
        {
          name: "Altschool Cloud Labs",
          description: "Terraform, CI/CD, and AWS labs from Altschool certification.",
          tech: ["Terraform", "AWS", "GitHub Actions", "Prometheus"],
          github: `${githubBase}/altschool-cloud-labs`,
          demo: null,
          icon: "fa-cloud",
          category: ["cloud"]
        },
        {
          name: "FashionForecast",
          description: "ML model predicting seasonal trends, deployed serverless.",
          tech: ["Python", "Flask", "AWS SAM", "Scikit-learn"],
          github: `${githubBase}/fashionforecast`,
          demo: null,
          icon: "fa-chart-line",
          category: ["ai", "fashion", "cloud"]
        }
      ];

      const grid = document.getElementById('projectsGrid');
      const filterButtons = document.querySelectorAll('.filter-btn');
      const projectCountSpan = document.getElementById('projectCount');
      const githubProfileLink = document.getElementById('githubProfileLink');
      if (githubProfileLink) githubProfileLink.href = githubBase;

      let activeFilter = 'all';

      // Render function with filter
      function renderProjects(filter = 'all') {
        const filtered = filter === 'all' 
          ? projectsData 
          : projectsData.filter(p => p.category.includes(filter));
        
        if (filtered.length === 0) {
          grid.innerHTML = `<div class="no-projects-message">
            <i class="fas fa-rocket" style="font-size: 2.5rem; margin-bottom: 16px; display: block;"></i>
            More projects coming soon in this category! ✨
          </div>`;
          projectCountSpan.textContent = '0';
          return;
        }

        let html = '';
        filtered.forEach((proj, idx) => {
          const techTags = proj.tech.map(t => `<span class="tech-tag">${t}</span>`).join('');
          const demoButton = proj.demo 
            ? `<a href="${proj.demo}" target="_blank" rel="noopener"><i class="fas fa-external-link-alt"></i> Live demo</a>` 
            : `<a href="${proj.github}" target="_blank" rel="noopener"><i class="fab fa-github"></i> Repository</a>`;
          
          html += `
            <div class="project-card" style="--order: ${idx};">
              <div class="project-icon"><i class="fas ${proj.icon}"></i></div>
              <h3>${proj.name}</h3>
              <div class="project-desc">${proj.description}</div>
              <div class="project-tech">${techTags}</div>
              <div class="project-links">
                <a href="${proj.github}" target="_blank"><i class="fab fa-github"></i> Code</a>
                ${demoButton}
              </div>
            </div>
          `;
        });
        grid.innerHTML = html;
        projectCountSpan.textContent = filtered.length;
      }

      // Filter click handler with animation
      function handleFilterClick(e) {
        const btn = e.currentTarget;
        const filterValue = btn.dataset.filter;
        
        // Update active class
        filterButtons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        // Animate out/in (simple re-render with CSS animation)
        grid.style.opacity = '0.6';
        grid.style.transition = 'opacity 0.15s';
        
        setTimeout(() => {
          renderProjects(filterValue);
          grid.style.opacity = '1';
        }, 120);
        
        activeFilter = filterValue;
      }

      filterButtons.forEach(btn => btn.addEventListener('click', handleFilterClick));

      // Initial render
      renderProjects('all');

      // Additional micro-animation: re-trigger animation on filter? already smooth
      // Update footer github links
      document.querySelectorAll('.social-links a[aria-label="GitHub"]').forEach(a => a.href = githubBase);
      
      // Nav link active class (simple)
      const navLinks = document.querySelectorAll('.nav-links a');
      navLinks.forEach(link => {
        link.addEventListener('click', function(e) {
          navLinks.forEach(l => l.classList.remove('active'));
          this.classList.add('active');
        });
      });

      // Set GitHub profile link in header
      const githubLinkSpan = document.querySelector('#githubProfileLink');
      if (githubLinkSpan) githubLinkSpan.href = githubBase;
    })();
  </script>
</body>
</html>
